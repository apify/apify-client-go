components:
  examples:
    ListOfRunsResponseExample:
      value:
        data:
          total: 2
          offset: 0
          limit: 1000
          desc: false
          count: 2
          items:
          - id: HG7ML7M8z78YcAPEB
            actId: HDSasDasz78YcAPEB
            actorTaskId: KJHSKHausidyaJKHs
            status: SUCCEEDED
            startedAt: 2019-11-30T07:34:24.202Z
            finishedAt: 2019-12-12T09:30:12.202Z
            buildId: HG7ML7M8z78YcAPEB
            buildNumber: 0.0.2
            meta:
              origin: WEB
            usageTotalUsd: 0.2
            defaultKeyValueStoreId: sfAjeR4QmeJCQzTfe
            defaultDatasetId: 3ZojQDdFTsyE7Moy4
            defaultRequestQueueId: so93g2shcDzK3pA85
          - id: HG7ML7M8z78YcAPEB
            actId: HDSasDasz78YcAPEB
            actorTaskId: KJHSKHausidyaJKHs
            status: FAILED
            startedAt: 2019-12-12T07:34:14.202Z
            finishedAt: 2019-12-13T08:36:13.202Z
            buildId: u78dML7M8z78YcAPEB
            buildNumber: 0.2.2
            meta:
              origin: DEVELOPMENT
            usageTotalUsd: 0.6
            defaultKeyValueStoreId: sffsouqlseJCQzTfe
            defaultDatasetId: CFGggdjQDsyE7Moyw
            defaultRequestQueueId: soowucklrmDzKpA8x
  parameters:
    offset:
      description: |
        Number of items that should be skipped at the start. The default value is `0`.
      explode: true
      in: query
      name: offset
      required: false
      schema:
        example: 0
        format: double
        type: number
      style: form
    limit:
      description: |
        Maximum number of items to return. The default value as well as the maximum is `1000`.
      explode: true
      in: query
      name: limit
      required: false
      schema:
        example: 1000
        format: double
        type: number
      style: form
    descCreatedAt:
      description: |
        If `true` or `1` then the objects are sorted by the `createdAt` field in
        descending order. By default, they are sorted in ascending order.
      explode: true
      in: query
      name: desc
      required: false
      schema:
        example: true
        type: boolean
      style: form
    actorId:
      description: Actor ID or a tilde-separated owner's username and Actor name.
      explode: false
      in: path
      name: actorId
      required: true
      schema:
        example: janedoe~my-actor
        type: string
      style: simple
    versionNumber:
      description: Actor version.
      explode: false
      in: path
      name: versionNumber
      required: true
      schema:
        example: "0.1"
        type: string
      style: simple
    descStartedAt:
      description: |
        If `true` or `1` then the objects are sorted by the `startedAt` field in
        descending order. By default, they are sorted in ascending order.
      explode: true
      in: query
      name: desc
      required: false
      schema:
        example: true
        type: boolean
      style: form
    waitForFinishBuild:
      description: |
        The maximum number of seconds the server waits for the build to finish.
        By default it is `0`, the maximum value is `60`. <!-- MAX_ACTOR_JOB_ASYNC_WAIT_SECS -->
        If the build finishes in time then the returned build object will have a
        terminal status (e.g. `SUCCEEDED`), otherwise it will have a transitional status (e.g. `RUNNING`).
      explode: true
      in: query
      name: waitForFinish
      required: false
      schema:
        example: 60
        format: double
        type: number
      style: form
    buildIdWithDefault:
      description: |
        ID of the build, found in the build's Info tab.
        Use the special value `default` to get the OpenAPI schema for the Actor's default build.
      explode: false
      in: path
      name: buildId
      required: true
      schema:
        example: soSkq9ekdmfOslopH
        type: string
      style: simple
    buildId:
      description: "ID of the build, found in the build's Info tab."
      explode: false
      in: path
      name: buildId
      required: true
      schema:
        example: soSkq9ekdmfOslopH
        type: string
      style: simple
    status:
      description: |
        Single status or comma-separated list of statuses, see ([available
        statuses](https://docs.apify.com/platform/actors/running/runs-and-builds#lifecycle)). Used to filter runs by the specified statuses only.
      explode: false
      in: query
      name: status
      required: false
      schema:
        example:
        - SUCCEEDED
        items:
          type: string
        type: array
        default: null
      style: form
    startedAfter:
      allowReserved: true
      description: |
        Filter runs that started after the specified date and time (inclusive).
        The value must be a valid ISO 8601 datetime string (UTC).
      explode: true
      in: query
      name: startedAfter
      required: false
      schema:
        example: 2025-09-01T00:00:00.000Z
        format: date-time
        type: string
      style: form
    startedBefore:
      allowReserved: true
      description: |
        Filter runs that started before the specified date and time (inclusive).
        The value must be a valid ISO 8601 datetime string (UTC).
      explode: true
      in: query
      name: startedBefore
      required: false
      schema:
        example: 2025-09-17T23:59:59.000Z
        format: date-time
        type: string
      style: form
    timeout:
      description: |
        Optional timeout for the run, in seconds. By default, the run uses the timeout from its configuration.
      explode: true
      in: query
      name: timeout
      required: false
      schema:
        example: 60
        format: double
        type: number
      style: form
    memory:
      description: |
        Memory limit for the run, in megabytes. The amount of memory can be set to a power of 2 with a minimum of 128.
        By default, the run uses the memory limit from its configuration.
      explode: true
      in: query
      name: memory
      required: false
      schema:
        example: 256
        format: double
        type: number
      style: form
    maxItems:
      description: |
        Specifies the maximum number of dataset items that will be charged for pay-per-result Actors.
        This does NOT guarantee that the Actor will return only this many items.
        It only ensures you won't be charged for more than this number of items.
        Only works for pay-per-result Actors.
        Value can be accessed in the actor run using `ACTOR_MAX_PAID_DATASET_ITEMS` environment variable.
      explode: true
      in: query
      name: maxItems
      required: false
      schema:
        example: 1000
        format: double
        type: number
      style: form
    maxTotalChargeUsd:
      description: |
        Specifies the maximum cost of the run. This parameter is
        useful for pay-per-event Actors, as it allows you to limit the amount
        charged to your subscription. You can access the maximum cost in your Actor
        by using the `ACTOR_MAX_TOTAL_CHARGE_USD` environment variable.
      explode: true
      in: query
      name: maxTotalChargeUsd
      required: false
      schema:
        example: 5
        format: double
        type: number
      style: form
    restartOnError:
      description: |
        Determines whether the run will be restarted if it fails.
      explode: true
      in: query
      name: restartOnError
      required: false
      schema:
        example: false
        type: boolean
      style: form
    build:
      description: |
        Specifies the Actor build to run. It can be either a build tag or build number.
        By default, the run uses the build from its configuration (typically `latest`).
      explode: true
      in: query
      name: build
      required: false
      schema:
        example: 0.1.234
        type: string
      style: form
    waitForFinishRun:
      description: |
        The maximum number of seconds the server waits for the run to finish. By
        default it is `0`, the maximum value is `60`. <!-- MAX_ACTOR_JOB_ASYNC_WAIT_SECS -->
        If the run finishes in time then the returned run object will have a terminal status (e.g. `SUCCEEDED`),
        otherwise it will have a transitional status (e.g. `RUNNING`).
      explode: true
      in: query
      name: waitForFinish
      required: false
      schema:
        example: 60
        format: double
        type: number
      style: form
    webhooks:
      description: |
        Specifies optional webhooks associated with the Actor run, which can be used to receive a notification
        e.g. when the Actor finished or failed. The value is a Base64-encoded JSON array whose items follow
        the WebhookRepresentation schema. For more information, see
        [Webhooks documentation](https://docs.apify.com/platform/integrations/webhooks).
      explode: true
      in: query
      name: webhooks
      required: false
      schema:
        example: dGhpcyBpcyBqdXN0IGV4YW1wbGUK...
        type: string
      style: form
    outputRecordKey:
      description: |
        Key of the record from run's default key-value store to be returned
        in the response. By default, it is `OUTPUT`.
      explode: true
      in: query
      name: outputRecordKey
      required: false
      schema:
        example: OUTPUT
        type: string
      style: form
    format:
      description: |
        Format of the results, possible values are: `json`, `jsonl`, `csv`, `html`, `xlsx`, `xml` and `rss`. The default value is `json`.
      explode: true
      in: query
      name: format
      required: false
      schema:
        example: json
        type: string
      style: form
    clean:
      description: |
        If `true` or `1` then the API endpoint returns only non-empty items and skips hidden fields (i.e. fields starting with the # character).
        The `clean` parameter is just a shortcut for `skipHidden=true` and `skipEmpty=true` parameters.
        Note that since some objects might be skipped from the output, that the result might contain less items than the `limit` value.
      explode: true
      in: query
      name: clean
      required: false
      schema:
        example: false
        type: boolean
      style: form
    datasetParameters_limit:
      description: Maximum number of items to return. By default there is no limit.
      explode: true
      in: query
      name: limit
      required: false
      schema:
        format: double
        type: number
      style: form
    fields:
      description: |
        A comma-separated list of fields which should be picked from the items, only these fields will remain in the resulting record objects.
        Note that the fields in the outputted items are sorted the same way as they are specified in the `fields` query parameter.
        You can use this feature to effectively fix the output format.
      explode: true
      in: query
      name: fields
      required: false
      schema:
        example: "myValue,myOtherValue"
        type: string
      style: form
    outputFields:
      description: |
        A comma-separated list of output field names that positionally rename the fields specified in the `fields` parameter.
        For example, `?fields=headline,url&outputFields=title,link` renames `headline` to `title` and `url` to `link` in the output.
        The number of names in `outputFields` must match the number of names in `fields`.
        Requires the `fields` parameter to be specified as well.
      explode: true
      in: query
      name: outputFields
      required: false
      schema:
        example: "title,link"
        type: string
      style: form
    omit:
      description: A comma-separated list of fields which should be omitted from the
        items.
      explode: true
      in: query
      name: omit
      required: false
      schema:
        example: "myValue,myOtherValue"
        type: string
      style: form
    unwind:
      description: |
        A comma-separated list of fields which should be unwound, in order which they should be processed. Each field should be either an array or an object.
        If the field is an array then every element of the array will become a separate record and merged with parent object.
        If the unwound field is an object then it is merged with the parent object.
        If the unwound field is missing or its value is neither an array nor an object and therefore cannot be merged with a parent object then the item gets preserved as it is.
        Note that the unwound items ignore the `desc` parameter.
      explode: true
      in: query
      name: unwind
      required: false
      schema:
        example: "myValue,myOtherValue"
        type: string
      style: form
    flatten:
      description: |
        A comma-separated list of fields which should transform nested objects into flat structures.

        For example, with `flatten="foo"` the object `{"foo":{"bar": "hello"}}` is turned into `{"foo.bar": "hello"}`.

        The original object with properties is replaced with the flattened object.
      explode: true
      in: query
      name: flatten
      required: false
      schema:
        example: myValue
        type: string
      style: form
    descDataset:
      description: |
        By default, results are returned in the same order as they were stored.
        To reverse the order, set this parameter to `true` or `1`.
      explode: true
      in: query
      name: desc
      required: false
      schema:
        example: true
        type: boolean
      style: form
    attachment:
      description: |
        If `true` or `1` then the response will define the `Content-Disposition:
        attachment` header, forcing a web browser to download the file rather
        than to display it. By default this header is not present.
      explode: true
      in: query
      name: attachment
      required: false
      schema:
        example: true
        type: boolean
      style: form
    delimiter:
      description: |
        A delimiter character for CSV files, only used if `format=csv`. You
        might need to URL-encode the character (e.g. use `%09` for tab or `%3B`
        for semicolon). The default delimiter is a simple comma (`,`).
      explode: true
      in: query
      name: delimiter
      required: false
      schema:
        example: ;
        type: string
      style: form
    bom:
      description: |
        All text responses are encoded in UTF-8 encoding. By default, the
        `format=csv` files are prefixed with the UTF-8 Byte Order Mark (BOM), while `json`, `jsonl`, `xml`, `html` and `rss` files are not.

        If you want to override this default behavior, specify `bom=1` query parameter to include the BOM or `bom=0` to skip it.
      explode: true
      in: query
      name: bom
      required: false
      schema:
        example: false
        type: boolean
      style: form
    xmlRoot:
      description: |
        Overrides default root element name of `xml` output. By default the root element is `items`.
      explode: true
      in: query
      name: xmlRoot
      required: false
      schema:
        example: items
        type: string
      style: form
    xmlRow:
      description: |
        Overrides default element name that wraps each page or page function result object in `xml` output. By default the element name is `item`.
      explode: true
      in: query
      name: xmlRow
      required: false
      schema:
        example: item
        type: string
      style: form
    skipHeaderRow:
      description: If `true` or `1` then header row in the `csv` format is skipped.
      explode: true
      in: query
      name: skipHeaderRow
      required: false
      schema:
        example: true
        type: boolean
      style: form
    skipHidden:
      description: |
        If `true` or `1` then hidden fields are skipped from the output, i.e. fields starting with the `#` character.
      explode: true
      in: query
      name: skipHidden
      required: false
      schema:
        example: false
        type: boolean
      style: form
    skipEmpty:
      description: |
        If `true` or `1` then empty items are skipped from the output.

        Note that if used, the results might contain less items than the limit value.
      explode: true
      in: query
      name: skipEmpty
      required: false
      schema:
        example: false
        type: boolean
      style: form
    simplified:
      description: |
        If `true` or `1` then, the endpoint applies the `fields=url,pageFunctionResult,errorInfo`
        and `unwind=pageFunctionResult` query parameters. This feature is used to emulate simplified results provided by the
        legacy Apify Crawler product and it's not recommended to use it in new integrations.
      explode: true
      in: query
      name: simplified
      required: false
      schema:
        example: false
        type: boolean
      style: form
    view:
      description: |
        Defines the view configuration for dataset items based on the schema definition.
        This parameter determines how the data will be filtered and presented.
        For complete specification details, see the [dataset schema documentation](/platform/actors/development/actor-definition/dataset-schema).
      explode: true
      in: query
      name: view
      required: false
      schema:
        example: overview
        type: string
      style: form
    skipFailedPages:
      description: |
        If `true` or `1` then, the all the items with errorInfo property will be skipped from the output.

        This feature is here to emulate functionality of API version 1 used for the legacy Apify Crawler product and it's not recommended to use it in new integrations.
      explode: true
      in: query
      name: skipFailedPages
      required: false
      schema:
        example: false
        type: boolean
      style: form
    feedTitle:
      description: |
        Overrides the auto-generated RSS channel `<title>` element.
        Only used when `format=rss`. If not provided, the title defaults to `Dataset <label>`.
      explode: true
      in: query
      name: feedTitle
      required: false
      schema:
        example: Latest posts from r/pasta
        type: string
      style: form
    feedDescription:
      description: |
        Overrides the auto-generated RSS channel `<description>` element.
        Only used when `format=rss`. If not provided, the description defaults to `Items in dataset with id "<datasetId>".`
      explode: true
      in: query
      name: feedDescription
      required: false
      schema:
        example: Scraped forum posts
        type: string
      style: form
    runId:
      description: Actor run ID.
      explode: false
      in: path
      name: runId
      required: true
      schema:
        example: 3KH8gEpp4d8uQSe8T
        type: string
      style: simple
    buildResurrect:
      description: |
        Specifies the Actor build to run. It can be either a build tag or build number.
        By default, the run is resurrected with the same build it originally used. Specifically,
        if a run was first started with the `latest` tag, which resolves to version `0.0.3` at the
        time, a run resurrected without this parameter will continue running with `0.0.3`, even if
        `latest` already points to a newer build.
      explode: true
      in: query
      name: build
      required: false
      schema:
        example: 0.1.234
        type: string
      style: form
    timeoutResurrect:
      description: |
        Optional timeout for the run, in seconds. By default, the run uses the timeout
        specified in the run that is being resurrected.
      explode: true
      in: query
      name: timeout
      required: false
      schema:
        example: 60
        format: double
        type: number
      style: form
    memoryResurrect:
      description: |
        Memory limit for the run, in megabytes. The amount of memory can be set to a power of 2
        with a minimum of 128. By default, the run uses the memory limit specified in the run
        that is being resurrected.
      explode: true
      in: query
      name: memory
      required: false
      schema:
        example: 256
        format: double
        type: number
      style: form
    restartOnErrorResurrect:
      description: |
        Determines whether the resurrected run will be restarted if it fails.
        By default, the resurrected run uses the same setting as before.
      explode: true
      in: query
      name: restartOnError
      required: false
      schema:
        example: false
        type: boolean
      style: form
    statusLastRun:
      description: Filter for the run status.
      explode: true
      in: query
      name: status
      required: false
      schema:
        example: SUCCEEDED
        type: string
      style: form
    signature:
      description: Signature used for the access.
      explode: true
      in: query
      name: signature
      required: false
      schema:
        example: 2wTI46Bg8qWQrV7tavlPI
        type: string
      style: form
    exclusiveStartKey:
      description: All keys up to this one (including) are skipped from the result.
      explode: true
      in: query
      name: exclusiveStartKey
      required: false
      schema:
        example: Ihnsp8YrvJ8102Kj
        type: string
      style: form
    keyValueStoreParameters_limit:
      description: Number of keys to be returned.
      explode: true
      in: query
      name: limit
      required: false
      schema:
        default: 1000
        example: 100
        format: int32
        maximum: 1000
        minimum: 1
        type: number
      style: form
    collectionKeys:
      description: Limit the results to keys that belong to a specific collection
        from the key-value store schema. The key-value store need to have a schema
        defined for this parameter to work.
      explode: true
      in: query
      name: collection
      required: false
      schema:
        example: postImages
        type: string
      style: form
    prefixKeys:
      description: Limit the results to keys that start with a specific prefix.
      explode: true
      in: query
      name: prefix
      required: false
      schema:
        example: post-images-
        type: string
      style: form
    collectionRecords:
      description: |
        If specified, only records belonging to a specific collection from the key-value store schema. The key-value store need to have a schema defined for this parameter to work.
      explode: true
      in: query
      name: collection
      required: false
      schema:
        example: my-collection
        type: string
      style: form
    prefixRecords:
      description: |
        If specified, only records whose key starts with the given prefix are included in the archive.
      explode: true
      in: query
      name: prefix
      required: false
      schema:
        example: my-prefix/
        type: string
      style: form
    recordKey:
      description: Key of the record.
      explode: false
      in: path
      name: recordKey
      required: true
      schema:
        example: someKey
        type: string
      style: simple
    keyValueStoreParameters_attachment:
      description: |
        If `true` or `1`, the response will be served with `Content-Disposition: attachment` header,
        causing web browsers to offer downloading HTML records instead of displaying them.
      explode: true
      in: query
      name: attachment
      required: false
      schema:
        example: true
        type: boolean
      style: form
    Content-Encoding:
      description: ""
      explode: false
      in: header
      name: Content-Encoding
      required: false
      schema:
        enum:
        - gzip
        - deflate
        - br
        - identity
        type: string
      style: simple
    clientKey:
      description: |
        A unique identifier of the client accessing the request queue. It must
        be a string between 1 and 32 characters long. This identifier is used to
        determine whether the queue was accessed by multiple clients. If
        `clientKey` is not provided,
        the system considers this API call to come from a new client. For
        details, see the `hadMultipleClients` field returned by the [Get
        head](#/reference/request-queues/queue-head) operation.
      explode: true
      in: query
      name: clientKey
      required: false
      schema:
        example: client-abc
        type: string
      style: form
    exclusiveStartId:
      deprecated: true
      description: "All requests up to this one (including) are skipped from the result.\
        \ (Deprecated, use `cursor` instead.)"
      explode: true
      in: query
      name: exclusiveStartId
      required: false
      schema:
        example: Ihnsp8YrvJ8102Kj
        type: string
      style: form
    listLimit:
      description: Number of keys to be returned. Maximum value is `10000`.
      explode: true
      in: query
      name: limit
      required: false
      schema:
        example: 100
        format: double
        type: number
      style: form
    cursor:
      description: "A cursor string for pagination, returned in the previous response\
        \ as `nextCursor`. Use this to retrieve the next page of requests."
      explode: true
      in: query
      name: cursor
      required: false
      schema:
        example: eyJyZXF1ZXN0SWQiOiI2OFRqQ2RaTDNvM2hiUU0ifQ
        type: string
      style: form
    filter:
      description: "Filter requests by their state. Possible values are `locked` and\
        \ `pending`. You can combine multiple values separated by commas, which will\
        \ mean the union of these filters – requests matching any of the specified\
        \ states will be returned. (Not compatible with deprecated `exclusiveStartId`\
        \ parameter.)"
      explode: false
      in: query
      name: filter
      required: false
      schema:
        example:
        - locked
        items:
          enum:
          - locked
          - pending
          type: string
        type: array
        default: null
      style: form
    forefront:
      description: |
        Determines if request should be added to the head of the queue or to the
        end. Default value is `false` (end of queue).
      explode: true
      in: query
      name: forefront
      required: false
      schema:
        example: "false"
        type: string
      style: form
    contentTypeJson:
      description: ""
      explode: false
      in: header
      name: Content-Type
      required: true
      schema:
        enum:
        - application/json
        type: string
      style: simple
    requestId:
      description: Request ID.
      explode: false
      in: path
      name: requestId
      required: true
      schema:
        example: xpsmkDlspokDSmklS
        type: string
      style: simple
    lockSecs:
      description: How long the requests will be locked for (in seconds).
      explode: true
      in: query
      name: lockSecs
      required: true
      schema:
        example: 60
        format: double
        type: number
      style: form
    lockForefront:
      description: |
        Determines if request should be added to the head of the queue or to the
        end after lock expires.
      explode: true
      in: query
      name: forefront
      required: false
      schema:
        example: "false"
        type: string
      style: form
    deleteForefront:
      description: |
        Determines if request should be added to the head of the queue or to the
        end after lock was removed.
      explode: true
      in: query
      name: forefront
      required: false
      schema:
        example: "false"
        type: string
      style: form
    headLimit:
      description: How many items from queue should be returned.
      explode: true
      in: query
      name: limit
      required: false
      schema:
        example: 100
        format: double
        type: number
      style: form
    headLockLimit:
      description: How many items from the queue should be returned.
      explode: true
      in: query
      name: limit
      required: false
      schema:
        example: 25
        format: double
        maximum: 25
        type: number
      style: form
    stream:
      description: |
        If `true` or `1` then the logs will be streamed as long as the run or build is running.
      explode: true
      in: query
      name: stream
      required: false
      schema:
        example: false
        type: boolean
      style: form
    download:
      description: |
        If `true` or `1` then the web browser will download the log file rather than open it in a tab.
      explode: true
      in: query
      name: download
      required: false
      schema:
        example: false
        type: boolean
      style: form
    raw:
      description: |
        If `true` or `1`, the logs will be kept verbatim. By default, the API removes
        ANSI escape codes from the logs, keeping only printable characters.
      explode: true
      in: query
      name: raw
      required: false
      schema:
        example: false
        type: boolean
      style: form
    gracefully:
      description: |
        If true passed, the Actor run will abort gracefully.
        It will send `aborting` and `persistState` event into run and force-stop the run after 30 seconds.
        It is helpful in cases where you plan to resurrect the run later.
      explode: true
      in: query
      name: gracefully
      required: false
      schema:
        example: true
        type: boolean
      style: form
    targetActorId:
      description: ID of a target Actor that the run should be transformed into.
      explode: true
      in: query
      name: targetActorId
      required: true
      schema:
        example: HDSasDasz78YcAPEB
        type: string
      style: form
    actorTaskId:
      description: Task ID or a tilde-separated owner's username and task's name.
      explode: false
      in: path
      name: actorTaskId
      required: true
      schema:
        example: janedoe~my-task
        type: string
      style: simple
    unnamed:
      description: |
        If `true` or `1` then all the storages are returned. By default, only
        named storages are returned.
      explode: true
      in: query
      name: unnamed
      required: false
      schema:
        example: true
        type: boolean
      style: form
    storeId:
      description: Key-value store ID or `username~store-name`.
      explode: false
      in: path
      name: storeId
      required: true
      schema:
        example: WkzbQMuFYuamGv3YF
        type: string
      style: simple
    datasetId:
      description: Dataset ID or `username~dataset-name`.
      explode: false
      in: path
      name: datasetId
      required: true
      schema:
        example: WkzbQMuFYuamGv3YF
        type: string
      style: simple
    queueId:
      description: Queue ID or `username~queue-name`.
      explode: false
      in: path
      name: queueId
      required: true
      schema:
        example: WkzbQMuFYuamGv3YF
        type: string
      style: simple
    webhookId:
      description: Webhook ID.
      explode: false
      in: path
      name: webhookId
      required: true
      schema:
        example: pVJtoTelgYUq4qJOt
        type: string
      style: simple
    scheduleId:
      description: Schedule ID.
      explode: false
      in: path
      name: scheduleId
      required: true
      schema:
        example: asdLZtadYvn4mBZmm
        type: string
      style: simple
    buildOrRunId:
      description: ID of the Actor build or run.
      explode: false
      in: path
      name: buildOrRunId
      required: true
      schema:
        example: HG7ML7M8z78YcAPE
        type: string
      style: simple
  responses:
    BadRequest:
      content:
        application/json:
          example:
            error:
              type: invalid-input
              message: "Invalid input: The request body contains invalid data."
          schema:
            $ref: "#/components/schemas/ErrorResponse"
      description: Bad request - invalid input parameters or request body.
    Unauthorized:
      content:
        application/json:
          example:
            error:
              type: invalid-token
              message: Authentication token is not valid.
          schema:
            $ref: "#/components/schemas/ErrorResponse"
      description: Unauthorized - authentication required or invalid token.
    Forbidden:
      content:
        application/json:
          example:
            error:
              type: insufficient-permissions
              message: You do not have permission to perform this action.
          schema:
            $ref: "#/components/schemas/ErrorResponse"
      description: Forbidden - insufficient permissions to perform this action.
    MethodNotAllowed:
      content:
        application/json:
          example:
            error:
              type: method-not-allowed
              message: "This API end-point can only be accessed using the following\
                \ HTTP methods: OPTIONS,GET"
          schema:
            $ref: "#/components/schemas/ErrorResponse"
      description: Method not allowed.
    TooManyRequests:
      content:
        application/json:
          example:
            error:
              type: rate-limit-exceeded
              message: You have exceeded the rate limit. Please try again later.
          schema:
            $ref: "#/components/schemas/ErrorResponse"
      description: Too many requests - rate limit exceeded.
    PayloadTooLarge:
      content:
        application/json:
          example:
            error:
              type: request-too-large
              message: "The POST payload is too large (limit: 9437184 bytes, actual\
                \ length: 10485760 bytes)."
          schema:
            $ref: "#/components/schemas/ErrorResponse"
      description: Payload too large - the request body exceeds the size limit.
    UnsupportedMediaType:
      content:
        application/json:
          example:
            error:
              type: unsupported-content-encoding
              message: Content-Encoding "bla" is not supported.
          schema:
            $ref: "#/components/schemas/ErrorResponse"
      description: Unsupported media type - the Content-Encoding of the request is
        not supported.
    NotFound:
      content:
        application/json:
          example:
            error:
              type: record-not-found
              message: The requested resource was not found.
          schema:
            $ref: "#/components/schemas/ErrorResponse"
      description: Not found - the requested resource does not exist.
    PaymentRequired:
      content:
        application/json:
          example:
            error:
              type: x402-payment-required
              message: Please provide X402-PAYMENT-SIGNATURE header with the payment.
                See https://x402.org.
          schema:
            $ref: "#/components/schemas/ErrorResponse"
      description: "Payment required - the user has exceeded their usage limit, does\
        \ not have enough credits, or the request lacks authentication and payment\
        \ credentials."
    NoContent:
      description: No content
    Conflict:
      content:
        application/json:
          example:
            error:
              type: actor-name-not-unique
              message: Record with the given name already exists.
          schema:
            $ref: "#/components/schemas/ErrorResponse"
      description: Conflict - the request could not be completed due to a conflict
        with the current state of the resource.
    RunTimeout:
      content:
        application/json:
          example:
            error:
              type: run-timeout-exceeded
              message: Actor run exceeded the timeout of 300 seconds for this API
                endpoint
          schema:
            $ref: "#/components/schemas/ErrorResponse"
      description: The HTTP request exceeded the timeout limit
  schemas:
    PaginationResponse:
      description: Common pagination fields for list responses.
      properties:
        total:
          description: The total number of items available across all pages.
          minimum: 0
          type: integer
        offset:
          description: The starting position for this page of results.
          minimum: 0
          type: integer
        limit:
          description: The maximum number of items returned per page.
          minimum: 1
          type: integer
        desc:
          description: Whether the results are sorted in descending order.
          type: boolean
        count:
          description: The number of items returned in this response.
          minimum: 0
          type: integer
      required:
      - count
      - desc
      - limit
